<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lab5_menu</title>
    <style>
        .menu {
        background-color: aquamarine;
        list-style: none;
        min-height: 30px;
        display: flex;
        }
        .menu li {
        line-height: 30px;
        margin-left: 30px;
        border-bottom: solid;
        }
        .menu li a {
            text-decoration: none;
        }
        .menu li a:hover {
            color:blue;
        }
        .horizontal-menu {
            list-style: none;
            padding: 0;
            display: flex;
        }
        .horizontal-menu li {
            margin-left: 1px;
            padding: 10px;
            background-color: aquamarine;
            transition: backgraound-color 0.3s ease-in-out;
        }
        .horizontal-menu li:hover {
            background-color: cadetblue;
            border-radius: 5px;
        }
        .horizontal-menu a:hover {
            font-weight: bold;
            text-decoration: underline;
            color:white;
        }
        .vertical-menu {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
        }
        .vertical-menu li {
            margin: 0;
            padding: 10px;
            background-color: blue;
            border-bottom: white solid 1px;
            transition: background-color 0.3s ease-in-out, 
            filter 0.3s ease-in-out
            transfrom 0.3s ease-in-out;
        }
        .vertical-menu li:hover {
            filter:brightness(130%) ;
            opacity: 0.8;
            font-style: italic;
        }
    </style>
</head>
<body>
    <!--menu ngang-->
        <ul class="horizontal-menu">
            <li><a href="">Trang chu </a></li>
            <li><a href="">Gioi thieu </a></li>
            <li><a href="">San pham</a></li>
            <li><a href="">Dich vu </a></li>
            <li><a href="">Lien he </a></li>
        </ul>
    <!--menu doc-->
        <ul class="vertical-menu">
            <li>Trang chu </li>
            <li>Gioi thieu</li>
            <li>San pham</li>
            <li>Dich vu</li>
            <li class="teo">Lien he</li>
        </ul>
</body>
</html>
