<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css.css">
</head>
<body>
    

    <div class="slideshow-container">

        <div class="myS fade"><img src="img/slide_1.jpg" style="width: 100%;"></div>
        <div class="myS fade"><img src="img/slide_2.jpg"  style="width: 100%;"></div>
        <div class="myS fade"><img src="img/slide_3.jpg" style="width: 100%;"></div>
        <div class="myS fade"><img src="img/slide_4.jpg" style="width: 100%;"></div>
        <div class="myS fade"><img src="img/slide_5.jpg" style="width: 100%;"></div>
        <a class="prev" onclick="plusSlides(-1)"></a>
        <a class="next"onclick="plusSlides(1)"></a>
    </div>
    <br>
    <div style="text-align: center;">
        <span class="dot" onclick="currentSlide(1)"></span>
        <span class="dot" onclick="currentSlide(2)"></span>
        <span class="dot" onclick="currentSlide(3)"></span>
        <span class="dot" onclick="currentSlide(4)"></span>
        <span class="dot" onclick="currentSlide(5)"></span>
    </div>

    <script>
        let a=1;
        let slides = document.getElementsByClassName("myS");
        let dots = document.getElementsByClassName("dot");
        showSlides(a);

        function plusSlides(n)
        {
            showSlides(a+=n);
        }

        function currentSlide(n)
        {
            showSlides(a=n);
        }

        function showSlides(n)
        {
            if(n>slides.length)
            {
                a=1
            }
            if(n<1)
            {
                a=slides.length
            }

            for (let i =0 ;i<slides.length; i++)
            {
                slides[i].style.display="none";
            }
            for (let i =0 ;i<dots.length;i++)
            {
                dots[i].className=dots[i].className.replace("active", "");
            }

            // Hiện hình hiện tại
            slides[a - 1].style.display = "block";

            // Active dot hiện tại
            dots[a - 1].className += " active";
            }      
            

            setInterval(function(){
            plusSlides(1);
            },2000);
    </script>
    
</body>
</html>
